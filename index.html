:root{--p:#7c3aed;--g:#10b981;--o:#f97316;--r:#ef4444;--y:#f59e0b;--s:#64748b;--card:#0f0f1a;--bd:rgba(124,58,237,0.2)}
input,select,textarea{font-family:'DM Sans',sans-serif;font-size:16px!important}
#hdr{background:linear-gradient(180deg,rgba(9,9,15,0.97),rgba(15,15,26,0.97));border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100}
#hdr-top{display:flex;align-items:center;justify-content:center;padding:12px 16px 0;position:relative}
#logo img{height:28px;display:block}
#menu-btn{position:absolute;right:16px;top:12px;background:none;border:none;color:#94a3b8;font-size:22px;cursor:pointer;line-height:1;padding:2px 6px}
nav{display:flex;width:100%}
nav button{flex:1;padding:10px 4px;background:none;border:none;border-bottom:2px solid transparent;color:var(--s);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;transition:all .2s;white-space:nowrap;text-align:center}
nav button.active{border-bottom-color:var(--p);color:#e2e8f0;font-weight:600}
#dropdown{display:none;position:absolute;right:12px;top:52px;background:#111120;border:1px solid var(--bd);border-radius:10px;z-index:200;min-width:140px;box-shadow:0 8px 24px rgba(0,0,0,.5)}
#dropdown.show{display:block}
#dropdown button{display:block;width:100%;padding:12px 16px;background:none;border:none;color:#e2e8f0;font-size:13px;cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif}
#dropdown button:hover{background:rgba(124,58,237,.1)}
#dropdown button+button{border-top:1px solid var(--bd)}
#cnt{padding:16px;max-width:900px;margin:0 auto}
.kartlar{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px}
@media(min-width:500px){.kartlar{grid-template-columns:repeat(3,1fr)}}
@media(min-width:700px){.kartlar{grid-template-columns:repeat(4,1fr)}}
.kart{background:linear-gradient(135deg,rgba(15,15,26,0.92),rgba(18,18,31,0.92));border-radius:10px;padding:14px 16px}
.kb{font-size:9px;color:var(--s);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.kd{font-family:'Syne',sans-serif;font-weight:700;font-size:22px}
.ka{font-size:10px;color:#475569;margin-top:2px}
.sec{margin-bottom:22px}
.sec-t{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:#e2e8f0;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.lk{background:rgba(15,15,26,0.92);border:1px solid rgba(124,58,237,.15);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.lk-b{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.lk-b strong{font-size:14px;color:#e2e8f0}
.lk-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px}
@media(min-width:400px){.lk-grid{grid-template-columns:repeat(3,1fr)}}
.lk-s{font-size:12px;color:var(--s)}
.lk-s span{color:#e2e8f0;font-weight:600}
.bdg{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;display:inline-block;white-space:nowrap}
.btn{border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:opacity .15s}
.btn:active{opacity:.75}
.btn-p{background:var(--p);color:#fff}
.btn-g{background:var(--g);color:#fff}
.btn-r{background:rgba(239,68,68,.15);color:var(--r);border:1px solid rgba(239,68,68,.2)}
.btn-y{background:rgba(245,158,11,.15);color:var(--y);border:1px solid rgba(245,158,11,.2)}
.btn-gh{background:transparent;color:#94a3b8;border:1px solid var(--bd)}
.btn-b{background:rgba(14,165,233,.15);color:#38bdf8;border:1px solid rgba(14,165,233,.2)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.ng{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:500px){.ng{grid-template-columns:repeat(2,1fr)}}
@media(min-width:800px){.ng{grid-template-columns:repeat(3,1fr)}}
.nk{background:linear-gradient(135deg,rgba(15,15,26,0.92),rgba(18,18,31,0.92));border:1px solid var(--bd);border-radius:12px;padding:16px;cursor:pointer;transition:border-color .2s}
.nk:hover{border-color:rgba(124,58,237,.5)}
.nk-ad{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:#e2e8f0;margin-bottom:2px}
.nk-kon{font-size:10px;color:var(--s);margin-bottom:10px}
.nk-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.nk-s .nl{font-size:9px;color:var(--s);text-transform:uppercase;letter-spacing:.5px}
.nk-s .nv{font-family:'Syne',sans-serif;font-weight:700;font-size:16px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:600px){.ov{align-items:center}}
.md{background:#0d0d1a;border:1px solid rgba(124,58,237,.3);border-radius:14px 14px 0 0;padding:20px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
@media(min-width:600px){.md{border-radius:14px;max-height:85vh}}
.md-t{font-family:'Syne',sans-serif;font-size:16px;color:#e2e8f0;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.md-t button{background:none;border:none;color:var(--s);font-size:26px;cursor:pointer;line-height:1;padding:0 4px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:10px;color:var(--s);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.fg input,.fg select,.fg textarea{width:100%;background:#07070f;border:1px solid rgba(124,58,237,.2);border-radius:8px;padding:10px 12px;color:#e2e8f0;outline:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:rgba(124,58,237,.5)}
.fg textarea{min-height:56px;resize:vertical}
.ib{background:rgba(14,165,233,.08);border:1px solid rgba(14,165,233,.2);border-radius:8px;padding:9px 12px;margin-bottom:12px;font-size:12px;color:#7dd3fc}
.wb{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:8px;padding:9px 12px;margin-bottom:12px;font-size:12px;color:#fcd34d}
.gb{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:8px;padding:9px 12px;margin-bottom:12px;font-size:12px;color:#6ee7b7}
.bos{text-align:center;padding:36px 16px;color:#475569;font-size:13px}
.bos-i{font-size:28px;margin-bottom:8px}
.sy-r{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.sy-r:last-child{border-bottom:none}
.sy-r .sy-i{flex:1;min-width:0}
.sy-r .sy-i strong{display:block;font-size:13px;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sy-r .sy-i span{font-size:10px;color:var(--s)}
.sy-r input[type=number]{width:60px;text-align:center;padding:7px 4px!important;background:#07070f;border:1px solid rgba(124,58,237,.2);border-radius:6px;color:#e2e8f0;outline:none;flex-shrink:0}
.sy-birak{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--s);white-space:nowrap;flex-shrink:0}
.sy-birak input[type=checkbox]{width:16px;height:16px;accent-color:var(--p);font-size:14px!important}
.tt-r{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.tt-r:last-child{border-bottom:none}
.tt-r .tt-i{flex:1;font-size:13px;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tt-r .tt-stk{font-size:10px;color:var(--s);display:block}
.tt-r input[type=number]{width:60px;text-align:center;padding:7px 4px!important;background:#07080f;border:1px solid rgba(124,58,237,.2);border-radius:6px;color:#e2e8f0;outline:none;flex-shrink:0}
.kt{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.kt button{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:transparent;color:var(--s);font-family:'DM Sans',sans-serif}
.kt button.active{background:var(--p);color:#fff;border-color:var(--p)}
.ur-i{display:flex;align-items:center;justify-content:space-between;gap:8px;background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.15);border-radius:6px;padding:6px 10px;margin-bottom:4px;font-size:12px;flex-wrap:wrap}
.kat-r{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.kat-r:last-child{border-bottom:none}
.kat-r .kat-ad{flex:1;font-size:13px;color:#e2e8f0}
.kat-r input[type=number]{width:80px;text-align:center;padding:7px 6px!important;background:#07070f;border:1px solid rgba(124,58,237,.2);border-radius:6px;color:#e2e8f0;outline:none}
</style>
</head>

<script>
const SK='polyplay_v6'
let S={
  ayarlar:{kategoriler:[{ad:'cakmak',maliyet:30},{ad:'anahtarlik',maliyet:20},{ad:'yumurta',maliyet:20}]},
  noktalar:[],skular:[],uretimler:[],teslimalar:[],sayimlar:[],hareketler:[],tahsilatlar:[]
}
let aktifSekme='genel',aktifNokta=null,stokCat='tumu',perfSira='satilan'
let _tslNId=null

const uid=()=>Date.now().toString(36)+Math.random().toString(36).substr(2,4)
const bugun=()=>new Date().toISOString().split('T')[0]
const tl=n=>Math.round(+n||0).toLocaleString('tr-TR')+' TL'
const tarih=t=>t?new Date(t+'T12:00:00').toLocaleDateString('tr-TR'):'--'
const IADE='iade'
const STAND_IADE='stand_iade'
const getKats=()=>S.ayarlar.kategoriler.map(k=>k.ad)
const getKatMal=kat=>S.ayarlar.kategoriler.find(k=>k.ad===kat)?.maliyet||0

async function load(){
  try{
    let r=await window.storage.get(SK)
    if(!r?.value)r=await window.storage.get('polyplay_v5')
    if(r?.value){
      const d=JSON.parse(r.value)
      if(d.noktalar)S.noktalar=d.noktalar
      if(d.skular)S.skular=d.skular
      if(d.uretimler)S.uretimler=d.uretimler
      if(d.teslimalar)S.teslimalar=d.teslimalar
      if(d.sayimlar)S.sayimlar=d.sayimlar
      if(d.hareketler)S.hareketler=d.hareketler
      if(d.tahsilatlar)S.tahsilatlar=d.tahsilatlar
      if(d.ayarlar){
        if(d.ayarlar.maliyetler&&!d.ayarlar.kategoriler){
          S.ayarlar.kategoriler=Object.keys(d.ayarlar.maliyetler).map(ad=>({ad,maliyet:d.ayarlar.maliyetler[ad]}))
        }else if(d.ayarlar.kategoriler){
          S.ayarlar.kategoriler=d.ayarlar.kategoriler
        }
      }
      S.teslimalar.forEach(t=>{if(!t.birimFiyat){const s=S.skular.find(x=>x.id===t.skuId);t.birimFiyat=s?.fiyat||75}})
      // Migration: eski IADE hareketlerini sayim gunuyle eslestirip STAND_IADE yap
      const sayimTarihleri=new Set(S.sayimlar.map(s=>s.tarih))
      S.hareketler.forEach(h=>{if(h.tip==='iade'&&sayimTarihleri.has(h.tarih))h.tip='stand_iade'})
    }
  }catch(e){}
}
async function sv(){try{await window.storage.set(SK,JSON.stringify(S))}catch(e){}}

function depodakiStok(skuId){
  const ur=S.uretimler.filter(u=>u.skuId===skuId).reduce((s,u)=>s+u.adet,0)
  const br=S.teslimalar.filter(t=>t.skuId===skuId).reduce((s,t)=>s+t.adet,0)
  const gd=S.hareketler.filter(h=>h.skuId===skuId).reduce((s,h)=>s+h.adet,0)
  return Math.max(0,ur-br+gd)
}

function nsd(nId,skuId){
  const tsl=S.teslimalar.filter(t=>t.noktaId===nId&&t.skuId===skuId)
  const har=S.hareketler.filter(h=>h.noktaId===nId&&h.skuId===skuId)
  const syl=[...S.sayimlar.filter(s=>s.noktaId===nId&&s.kalanlar.some(k=>k.skuId===skuId))].sort((a,b)=>new Date(b.tarih)-new Date(a.tarih))
  const topBir=tsl.reduce((s,t)=>s+t.adet,0)
  const topIade=har.filter(h=>h.tip===IADE||h.tip===STAND_IADE).reduce((s,h)=>s+h.adet,0)
  const net=topBir-topIade
  const fT=tsl.reduce((s,t)=>s+(t.adet*(t.birimFiyat||S.skular.find(x=>x.id===skuId)?.fiyat||75)),0)
  const ort=topBir>0?fT/topBir:(S.skular.find(x=>x.id===skuId)?.fiyat||75)
  const son=syl[0]||null
  let rafta,satilan,sayimYok
  if(son){
    sayimYok=false
    const sonK=son.kalanlar.find(k=>k.skuId===skuId)?.kalan??0
    const bSonra=tsl.filter(t=>t.tarih>=son.tarih).reduce((s,t)=>s+t.adet,0)
    const gSonra=har.filter(h=>h.tip===STAND_IADE&&h.tarih>=son.tarih).reduce((s,h)=>s+h.adet,0)+har.filter(h=>h.tip===IADE&&h.tarih>son.tarih).reduce((s,h)=>s+h.adet,0)
    rafta=Math.max(0,sonK+bSonra-gSonra)
    satilan=Math.max(0,net-rafta)
  }else{sayimYok=true;rafta=Math.max(0,net);satilan=0}
  let rotasyon=false
  if(syl.length>=2){
    const s0=syl[0].kalanlar.find(k=>k.skuId===skuId)?.kalan??0
    const s1=syl[1].kalanlar.find(k=>k.skuId===skuId)?.kalan??0
    const aE=tsl.filter(t=>t.tarih>syl[1].tarih&&t.tarih<=syl[0].tarih).reduce((s,t)=>s+t.adet,0)
    const aG=har.filter(h=>h.tarih>=syl[1].tarih&&h.tarih<syl[0].tarih).reduce((s,h)=>s+h.adet,0)
    rotasyon=(s1+aE-aG-s0)<=0
  }
  const sku=S.skular.find(x=>x.id===skuId)
  const mal=getKatMal(sku?.kategori)
  return{topBir,topIade,net,rafta,satilan,gelir:satilan*ort,kar:satilan*(ort-mal),ort,sonT:son?.tarih||null,rotasyon,sayimYok}
}

function noktaToplam(nId){
  const ids=[...new Set(S.teslimalar.filter(t=>t.noktaId===nId).map(t=>t.skuId))]
  const b=ids.reduce((a,sid)=>{const d=nsd(nId,sid);return{rafta:a.rafta+d.rafta,satilan:a.satilan+d.satilan,gelir:a.gelir+d.gelir,kar:a.kar+d.kar,iade:a.iade+d.topIade,sayimYok:a.sayimYok+(d.sayimYok&&d.rafta>0?1:0)}},{rafta:0,satilan:0,gelir:0,kar:0,iade:0,sayimYok:0})
  const tah=S.tahsilatlar.filter(t=>t.noktaId===nId).reduce((s,t)=>s+t.tutar,0)
  b.tahsilat=tah;b.borc=Math.max(0,b.gelir-tah)
  return b
}

function genelToplam(){
  const g={rafta:0,satilan:0,gelir:0,kar:0,iade:0,depo:0,aktif:0,sayimBek:0,borc:0}
  S.noktalar.forEach(n=>{const d=noktaToplam(n.id);g.rafta+=d.rafta;g.satilan+=d.satilan;g.gelir+=d.gelir;g.kar+=d.kar;g.iade+=d.iade;g.sayimBek+=d.sayimYok;g.borc+=d.borc;if(n.durum==='aktif')g.aktif++})
  g.depo=S.skular.reduce((s,sku)=>s+depodakiStok(sku.id),0)
  return g
}

  var all=[]
  S.uretimler.forEach(function(u){var s=S.skular.find(function(x){return x.id===u.skuId});all.push({tarih:u.tarih,renk:'16,185,129',icon:'U',ac:(s?s.model:'?')+' +'+u.adet+' adet',not:u.not})})
  S.teslimalar.forEach(function(t){var s=S.skular.find(function(x){return x.id===t.skuId});var n=S.noktalar.find(function(x){return x.id===t.noktaId});all.push({tarih:t.tarih,renk:'14,165,233',icon:'T',ac:(s?s.model:'?')+' -> '+(n?n.ad:'?')+' '+t.adet+' adet',not:t.not})})
  S.sayimlar.forEach(function(s){var n=S.noktalar.find(function(x){return x.id===s.noktaId});all.push({tarih:s.tarih,renk:'124,58,237',icon:'S',ac:(n?n.ad:'?')+' sayimi',not:s.not})})
  S.hareketler.forEach(function(h){var s=S.skular.find(function(x){return x.id===h.skuId});var n=S.noktalar.find(function(x){return x.id===h.noktaId});all.push({tarih:h.tarih,renk:'239,68,68',icon:'I',ac:(s?s.model:'?')+' <- '+(n?n.ad:'?')+' '+h.adet+' iade',not:h.not})})
  S.tahsilatlar.forEach(function(t){var n=S.noktalar.find(function(x){return x.id===t.noktaId});all.push({tarih:t.tarih,renk:'16,185,129',icon:'P',ac:(n?n.ad:'?')+' '+tl(t.tutar)+' tahsilat',not:t.not})})
  all.sort(function(a,c){return new Date(c.tarih)-new Date(a.tarih)})
  if(!all.length)return'<div class="bos"><div class="bos-i">!</div>Henuz kayit yok.</div>'
  var h='<div class="sec"><div class="sec-t">Tum Hareketler ('+all.length+')</div>'
  all.forEach(function(x){h+='<div style="background:var(--card);border:1px solid rgba('+x.renk+',.2);border-radius:10px;padding:11px 13px;display:flex;align-items:flex-start;gap:10px;margin-bottom:7px"><span style="font-size:12px;flex-shrink:0;background:rgba('+x.renk+',.2);border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;color:rgb('+x.renk+')">'+x.icon+'</span><div style="flex:1;min-width:0"><div style="font-size:12px;color:#e2e8f0">'+x.ac+'</div>'+(x.not?'<div style="font-size:11px;color:var(--s);margin-top:2px">'+x.not+'</div>':'')+'</div><span style="font-size:11px;color:#475569;white-space:nowrap">'+tarih(x.tarih)+'</span></div>'})
  return h+'</div>'
}

// ===== AYARLAR =====
function acGecmis(){kmc();document.getElementById('dropdown').classList.remove('show');mc('<div class="md"><div class="md-t">Gecmis <button onclick="kmc()">x</button></div>'+rGecmis()+'</div>')}
function acAyarlar(){document.getElementById('dropdown').classList.remove('show');renderAyarlar()}
function renderAyarlar(){
  var satirlar=S.ayarlar.kategoriler.map(function(k,i){return'<div class="kat-r"><div class="kat-ad">'+k.ad+'</div><input type="number" id="km-'+i+'" value="'+k.maliyet+'" placeholder="TL"><button class="btn btn-r btn-sm" onclick="silKat('+i+')">Sil</button></div>'}).join('')
  mc('<div class="md"><div class="md-t">Ayarlar <button onclick="kmc()">x</button></div>'+
    '<div class="ib">Kategori bazli sabit birim maliyet. Net kar hesabinda kullanilir.</div>'+
    '<div style="margin-bottom:12px">'+satirlar+'</div>'+
    '<div style="display:flex;gap:8px;margin-bottom:16px"><input id="yeni-kat" placeholder="Yeni kategori" style="flex:1;background:#07070f;border:1px solid rgba(124,58,237,.2);border-radius:8px;padding:10px 12px;color:#e2e8f0;outline:none"><button class="btn btn-p" onclick="katEkle()">Ekle</button></div>'+
    '<div class="btn-row" style="justify-content:flex-end"><button class="btn btn-gh" onclick="kmc()">Iptal</button><button class="btn btn-p" onclick="kvAyarlar()">Kaydet</button></div>'+
  '</div>')
}
function katEkle(){
  var el=document.getElementById('yeni-kat')
  var ad=(el?el.value.trim().toLowerCase():'')
  if(!ad){alert('Kategori adi girin');return}
  if(S.ayarlar.kategoriler.find(function(k){return k.ad===ad})){alert('Bu kategori zaten var');return}
  S.ayarlar.kategoriler.push({ad:ad,maliyet:0})
  sv();renderAyarlar()
}
function silKat(i){
  var kat=S.ayarlar.kategoriler[i]
  if(S.skular.some(function(s){return s.kategori===kat.ad})){alert('"'+kat.ad+'" kategorisinde urun var, once urunleri tasiyin.');return}
  if(!confirm('"'+kat.ad+'" silinecek?'))return
  S.ayarlar.kategoriler.splice(i,1);sv();renderAyarlar()
}
function kvAyarlar(){
  S.ayarlar.kategoriler.forEach(function(k,i){var el=document.getElementById('km-'+i);if(el)k.maliyet=parseFloat(el.value)||0})
  sv();kmc();render()
}

// ===== NOKTA =====
function mNokta(d){
  d=d||null
  mc('<div class="md"><div class="md-t">'+(d?'Nokta Duzenle':'Nokta Ekle')+' <button onclick="kmc()">x</button></div>'+
    '<div class="fg"><label>Nokta Adi *</label><input id="n-a" value="'+(d?d.ad||'':'')+'" placeholder="Erkut Abi Bufesi"></div>'+
    '<div class="fg"><label>Konum</label><input id="n-k" value="'+(d?d.konum||'':'')+'" placeholder="Carsi..."></div>'+
    '<div class="fg"><label>Durum</label><select id="n-d"><option value="aktif"'+(!d||d.durum==='aktif'?' selected':'')+'>Aktif</option><option value="pasif"'+(d&&d.durum==='pasif'?' selected':'')+'>Pasif</option></select></div>'+
    '<div class="btn-row" style="justify-content:flex-end;margin-top:8px"><button class="btn btn-gh" onclick="kmc()">Iptal</button><button class="btn btn-p" onclick="kvNokta(\''+(d?d.id:'')+'\')">Kaydet</button></div>'+
  '</div>')
}
function mNoktaDuzenle(id){mNokta(S.noktalar.find(function(x){return x.id===id}))}
function kvNokta(id){
  var ad=document.getElementById('n-a').value.trim()
  if(!ad){alert('Nokta adi zorunlu');return}
  var obj={ad:ad,konum:document.getElementById('n-k').value.trim(),durum:document.getElementById('n-d').value}
  if(id)S.noktalar=S.noktalar.map(function(n){return n.id===id?Object.assign({},n,obj):n})
  else S.noktalar.push(Object.assign({id:uid()},obj))
  sv();kmc();render()
}
function silNokta(id){
  var n=S.noktalar.find(function(x){return x.id===id})
  if(!confirm('"'+n.ad+'" silinecek. Tum veriler silinir. Devam?'))return
  S.noktalar=S.noktalar.filter(function(x){return x.id!==id})
  S.teslimalar=S.teslimalar.filter(function(x){return x.noktaId!==id})
  S.sayimlar=S.sayimlar.filter(function(x){return x.noktaId!==id})
  S.hareketler=S.hareketler.filter(function(x){return x.noktaId!==id})
  S.tahsilatlar=S.tahsilatlar.filter(function(x){return x.noktaId!==id})
  aktifNokta=null;sv();render()
}
function mKapat(id){
  var n=S.noktalar.find(function(x){return x.id===id})
  var d=noktaToplam(id)
  mc('<div class="md"><div class="md-t">Noktayi Kapat <button onclick="kmc()">x</button></div>'+
    '<div class="gb">Nokta pasife alinir, veriler korunur.</div>'+
    '<div class="lk" style="margin-bottom:12px"><div class="lk-b"><strong>'+n.ad+'</strong></div><div class="lk-grid"><div class="lk-s">Satilan: <span style="color:var(--g)">'+d.satilan+' adet</span></div><div class="lk-s">Gelir: <span style="color:var(--p)">'+tl(d.gelir)+'</span></div><div class="lk-s">Kalan Borc: <span style="color:var(--r)">'+tl(d.borc)+'</span></div><div class="lk-s">Rafta: <span style="color:var(--o)">'+d.rafta+' adet</span></div></div></div>'+
    (d.borc>0?'<div class="wb">'+tl(d.borc)+' tahsil edilmemis borc var!</div>':'')+
    (d.rafta>0?'<div class="wb">Rafta '+d.rafta+' urun hala bu noktada.</div>':'')+
    '<div class="btn-row" style="justify-content:flex-end"><button class="btn btn-gh" onclick="kmc()">Iptal</button><button class="btn btn-r" onclick="kapatNokta(\''+id+'\')">Kapat</button></div>'+
  '</div>')
}
function kapatNokta(id){S.noktalar=S.noktalar.map(function(n){return n.id===id?Object.assign({},n,{durum:'pasif'}):n});sv();kmc();aktifNokta=null;render()}

// ===== SKU =====
function mSku(){mSkuForm(null)}
function mSkuDuzenle(id){mSkuForm(S.skular.find(function(x){return x.id===id}))}
function mSkuForm(d){
  var kats=getKats()
  var katOpts=kats.map(function(k){return'<option value="'+k+'"'+(d&&d.kategori===k?' selected':'')+'>'+k.charAt(0).toUpperCase()+k.slice(1)+'</option>'}).join('')
  mc('<div class="md"><div class="md-t">'+(d?'Urun Duzenle':'Yeni Urun')+' <button onclick="kmc()">x</button></div>'+
    '<div class="fg"><label>Model Adi *</label><input id="s-m" value="'+(d?d.model||'':'')+'" placeholder="Batman, Jerry..."></div>'+
    '<div class="fg"><label>Kategori</label><select id="s-k">'+katOpts+'</select></div>'+
    '<div class="fg"><label>Satis Fiyati (TL)</label><input id="s-f" type="number" value="'+(d?d.fiyat||75:75)+'"></div>'+
    (!d?'<div class="fg"><label>Ilk Uretim Adedi (opsiyonel)</label><input id="s-ur" type="number" placeholder="0" min="0"></div><div class="fg"><label>Uretim Tarihi</label><input id="s-ut" type="date" value="'+bugun()+'"></div>':'')+
    '<div class="btn-row" style="justify-content:flex-end;margin-top:8px"><button class="btn btn-gh" onclick="kmc()">Iptal</button><button class="btn btn-p" onclick="kvSku(\''+(d?d.id:'')+'\')">Kaydet</button></div>'+
  '</div>')
}
function kvSku(id){
  var model=document.getElementById('s-m').value.trim()
  if(!model){alert('Model adi zorunlu');return}
  var obj={model:model,kategori:document.getElementById('s-k').value,fiyat:parseFloat(document.getElementById('s-f').value)||75}
  if(id){S.skular=S.skular.map(function(s){return s.id===id?Object.assign({},s,obj):s})}
  else{
    var yId=uid()
    S.skular.push(Object.assign({id:yId},obj))
    var ua=parseInt(document.getElementById('s-ur')&&document.getElementById('s-ur').value)||0
    if(ua>0)S.uretimler.push({id:uid(),skuId:yId,adet:ua,tarih:document.getElementById('s-ut')&&document.getElementById('s-ut').value||bugun(),not:''})
  }
  sv();kmc();render()
}
function silSku(id){
  var s=S.skular.find(function(x){return x.id===id})
  if(!confirm('"'+s.model+'" silinecek. Devam?'))return
  S.skular=S.skular.filter(function(x){return x.id!==id});sv();render()
}

    '<div class="ib">Uretilen urunler depoya girer.</div>'+
    '<div class="fg"><label>Urun *</label><select id="ur-s">'+S.skular.map(function(s){return'<option value="'+s.id+'"'+(s.id===skuId?' selected':'')+'>'+s.model+' ('+s.kategori+')</option>'}).join('')+'</select></div>'+

  '</div>')
}
function kvUretim(){
  var adet=parseInt(document.getElementById('ur-a').value)
  if(!adet||adet<=0){alert('Gecerli adet girin');return}
  S.uretimler.push({id:uid(),skuId:document.getElementById('ur-s').value,adet:adet,tarih:document.getElementById('ur-t').value,not:document.getElementById('ur-n').value})
  sv();kmc();render()
}
function silUretim(id){if(!confirm('Silinsin mi?'))return;S.uretimler=S.uretimler.filter(function(x){return x.id!==id});sv();render()}

// ===== TESLIMAT - global buildTsl ile duzeltildi =====
function mTeslimat(nId){
  if(!S.skular.length){alert('Once urun ekleyin');return}
  _tslNId=nId
  var ilkKat=getKats()[0]||'cakmak'
  buildTsl(ilkKat)
}

function buildTsl(kat){
  var nId=_tslNId
  var kats=getKats()
  var filtSku=S.skular.filter(function(s){return s.kategori===kat})
  var satirlar=filtSku.map(function(s){
    var stk=depodakiStok(s.id)
    return'<div class="tt-r"><div class="tt-i">'+s.model+'<span class="tt-stk">Depoda: '+stk+'</span></div><input type="number" id="tt-'+s.id+'" min="0" placeholder="0"'+(stk===0?' disabled':'')+' ></div>'
  }).join('')
  var tablar=kats.map(function(k){return'<button class="'+(k===kat?'active':'')+'" onclick="buildTsl(\''+k+'\')">'+k.charAt(0).toUpperCase()+k.slice(1)+'</button>'}).join('')
  document.getElementById('mc').innerHTML='<div class="ov" onclick="if(event.target===this)kmc()"><div class="md">'+
    '<div class="md-t">+ Teslimat <button onclick="kmc()">x</button></div>'+
    '<div class="ib">Adet girdigin urunler depodan dusuler ve rafa eklenir.</div>'+
    '<div class="kt">'+tablar+'</div>'+
    '<div style="max-height:260px;overflow-y:auto">'+(filtSku.length?satirlar:'<div class="bos" style="padding:16px">Bu kategoride urun yok.</div>')+'</div>'+
    '<div class="fg" style="margin-top:10px"><label>Tarih</label><input id="tt-t" type="date" value="'+bugun()+'"></div>'+
    '<div class="fg"><label>Not</label><textarea id="tt-n" placeholder="Opsiyonel..."></textarea></div>'+
    '<div class="btn-row" style="justify-content:flex-end;margin-top:8px"><button class="btn btn-gh" onclick="kmc()">Iptal</button><button class="btn btn-g" onclick="kvTeslimat(\''+nId+'\',\''+kat+'\')">Onayla</button></div>'+
  '</div></div>'
}

function kvTeslimat(nId,kat){
  var filtSku=S.skular.filter(function(s){return s.kategori===kat})
  var tVal=document.getElementById('tt-t').value
  var nVal=document.getElementById('tt-n').value
  var eklendi=0
  filtSku.forEach(function(s){
    var el=document.getElementById('tt-'+s.id);if(!el)return
    var adet=parseInt(el.value)||0;if(adet<=0)return
    var stk=depodakiStok(s.id)
    if(adet>stk){alert(s.model+': depoda '+stk+' adet var');return}
    S.teslimalar.push({id:uid(),noktaId:nId,skuId:s.id,adet:adet,birimFiyat:s.fiyat,tarih:tVal,not:nVal})
    eklendi++
  })
  if(!eklendi){alert('En az bir urune adet girin');return}
  sv();kmc();render()
}
function silTeslimat(id){if(!confirm('Bu teslimat silinecek.'))return;S.teslimalar=S.teslimalar.filter(function(x){return x.id!==id});sv();render()}

// ===== STAND YENILE =====
function mStandYenile(nId){
  var skuIds=[...new Set(S.teslimalar.filter(function(t){return t.noktaId===nId}).map(function(t){return t.skuId}))]
  if(!skuIds.length){alert('Bu noktaya henuz teslimat yapilmadi');return}
  var satirlar=skuIds.map(function(sid){
    var s=S.skular.find(function(x){return x.id===sid})
    var d=nsd(nId,sid)
    if(d.rafta===0)return''
    return'<div class="sy-r"><div class="sy-i"><strong>'+(s?s.model:'?')+'</strong><span>'+(s?s.kategori:'')+' -- Sistemde: '+d.rafta+'</span></div><input type="number" id="sy-'+sid+'" value="'+d.rafta+'" min="0"><label class="sy-birak"><input type="checkbox" id="bk-'+sid+'"> Birak</label></div>'
  }).filter(Boolean).join('')
  mc('<div class="md"><div class="md-t">Stand Yenile <button onclick="kmc()">x</button></div>'+
    '<div class="ib">Rafta gercek kalan adeti girin.<br>Birak: noktada kalir. Isaretsiz: stoka iade alinir.</div>'+
    '<div class="fg"><label>Tarih</label><input id="sy-t" type="date" value="'+bugun()+'"></div>'+
    '<div style="max-height:280px;overflow-y:auto;margin-bottom:10px">'+(satirlar||'<div class="bos" style="padding:16px">Rafta urun yok.</div>')+'</div>'+
    '<div class="fg"><label>Not</label><textarea id="sy-n" placeholder="Sayim notu..."></textarea></div>'+
    '<div class="btn-row" style="justify-content:flex-end;margin-top:8px"><button class="btn btn-gh" onclick="kmc()">Iptal</button><button class="btn btn-p" onclick="kvStandYenile(\''+nId+'\',\''+skuIds.join(',')+'\')">Onayla</button></div>'+
  '</div>')
}
function kvStandYenile(nId,idsStr){
  var ids=idsStr.split(',')
  var tVal=document.getElementById('sy-t').value
  var nVal=document.getElementById('sy-n').value
  var kalanlar=[]
  ids.forEach(function(sid){
    var el=document.getElementById('sy-'+sid);if(!el)return
    var kalan=parseInt(el.value)||0
    kalanlar.push({skuId:sid,kalan:kalan})
    var birak=document.getElementById('bk-'+sid)&&document.getElementById('bk-'+sid).checked
    if(!birak&&kalan>0)S.hareketler.push({id:uid(),noktaId:nId,skuId:sid,adet:kalan,tip:STAND_IADE,tarih:tVal,not:nVal})
  })
  if(kalanlar.length>0)S.sayimlar.push({id:uid(),noktaId:nId,tarih:tVal,not:nVal,kalanlar:kalanlar})
  sv();kmc();render()
}
function silSayim(id){if(!confirm('Bu sayim silinecek. Satis hesaplari etkilenir.'))return;S.sayimlar=S.sayimlar.filter(function(x){return x.id!==id});sv();render()}
function silHareket(id){if(!confirm('Silinsin mi?'))return;S.hareketler=S.hareketler.filter(function(x){return x.id!==id});sv();render()}

// ===== TAHSILAT =====
function mTahsilat(nId){
  var d=noktaToplam(nId)
  mc('<div class="md"><div class="md-t">Tahsilat Al <button onclick="kmc()">x</button></div>'+
    '<div class="lk" style="margin-bottom:12px"><div class="lk-grid"><div class="lk-s">Toplam Gelir: <span style="color:var(--p)">'+tl(d.gelir)+'</span></div><div class="lk-s">Tahsil Edilen: <span style="color:var(--g)">'+tl(d.tahsilat)+'</span></div><div class="lk-s">Kalan Borc: <span style="color:var(--r)">'+tl(d.borc)+'</span></div></div></div>'+
    '<div class="fg"><label>Tahsil Edilen Tutar (TL) *</label><input id="th-t" type="number" placeholder="'+Math.round(d.borc)+'"></div>'+
    '<div class="fg"><label>Tarih</label><input id="th-d" type="date" value="'+bugun()+'"></div>'+
    '<div class="fg"><label>Not</label><textarea id="th-n" placeholder="Opsiyonel..."></textarea></div>'+
    '<div class="btn-row" style="justify-content:flex-end;margin-top:8px"><button class="btn btn-gh" onclick="kmc()">Iptal</button><button class="btn btn-g" onclick="kvTahsilat(\''+nId+'\')">Kaydet</button></div>'+
  '</div>')
}
function kvTahsilat(nId){
  var tutar=parseFloat(document.getElementById('th-t').value)
  if(!tutar||tutar<=0){alert('Gecerli tutar girin');return}
  S.tahsilatlar.push({id:uid(),noktaId:nId,tutar:tutar,tarih:document.getElementById('th-d').value,not:document.getElementById('th-n').value})
  sv();kmc();render()
}
function silTahsilat(id){if(!confirm('Bu tahsilat silinecek.'))return;S.tahsilatlar=S.tahsilatlar.filter(function(x){return x.id!==id});sv();render()}

function render(){
  var h=''
  if(aktifSekme==='genel')h=rGenel()
  else if(aktifSekme==='noktalar')h=rNoktalar()
  else if(aktifSekme==='stok')h=rStok()
  else if(aktifSekme==='perf')h=rPerf()
  document.getElementById('cnt').innerHTML=h
}

load().then(function(){render()})
</script>
