<!DOCTYPE html>
<html lang="tr"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PolyPlay — Yönetim</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root{ --bg:#0f0f0f; --bg2:#1a1a1a; --border:#2e2e2e; --text:#f0f0f0; --text2:#888; --accent:#ff5733; --green:#22c55e; --yellow:#f59e0b; --red:#ef4444; --radius:12px; }
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;padding-bottom:80px}
.header{padding:20px 16px; display:flex; justify-content:space-between; align-items:center}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px 16px}
.s-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px}
.s-val{font-size:20px;font-weight:600;font-family:'DM Mono',monospace}
.tabs{display:flex;gap:4px;padding:8px 16px;position:sticky;top:0;background:var(--bg);z-index:10}
.tab{flex:1;padding:12px;font-size:13px;border:0.5px solid var(--border);border-radius:8px;background:var(--bg2);color:var(--text2);text-align:center;cursor:pointer}
.tab.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.pill{display:inline-block;padding:4px 8px;border-radius:6px;font-size:11px;background:#242424;margin-right:4px;border:1px solid var(--border)}
.btn-sm{padding:10px;font-size:12px;border-radius:6px;border:1px solid var(--border);background:#242424;color:var(--text);cursor:pointer;flex:1}
.w-block{background:#242424;padding:12px;border-radius:8px;margin-top:10px;border-left:3px solid var(--accent);position:relative}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px}
.field input, .field select{width:100%;background:#242424;border:1px solid var(--border);border-radius:8px;padding:12px;color:#fff;outline:none}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:flex-end;z-index:100;padding:16px}
.modal{background:var(--bg2);border-radius:var(--radius);padding:20px;width:100%;max-width:400px;margin:0 auto}
.hidden{display:none}
</style>
</head>
<body>
<div class="header"><strong>Poly<span>Play</span></strong><span id="hdate" style="font-size:12px;color:var(--text2)"></span></div>
<div id="stats-grid" class="stats"></div>
<div class="tabs">
    <div class="tab" id="tab-yeni" onclick="setTab('yeni')">Yeni</div>
    <div class="tab on" id="tab-liste" onclick="setTab('liste')">Standlar</div>
    <div class="tab" id="tab-noktalar" onclick="setTab('noktalar')">Noktalar</div>
</div>
<div class="content" id="content"></div>
<div class="modal-bg hidden" id="modal-bg" onclick="if(event.target.id==='modal-bg') closeModal()">
    <div class="modal" id="modal-inner"></div>
</div>

<script>
// Hafızadan fiyatı al, yoksa 75 yap
let PRICE = Number(localStorage.getItem('pp_price') || 75);
let kayitlar = JSON.parse(localStorage.getItem('pp_k') || '[]');
let noktalar = JSON.parse(localStorage.getItem('pp_n') || '["Erkut büfe","Pastane","Kırtasiye","Ucuzluk"]');
let tab = 'liste';

const save = () => { 
    localStorage.setItem('pp_k', JSON.stringify(kayitlar)); 
    localStorage.setItem('pp_n', JSON.stringify(noktalar)); 
    localStorage.setItem('pp_price', PRICE);
};

const setTab = (t) => { tab = t; render(); };
const closeModal = () => document.getElementById('modal-bg').classList.add('hidden');
const fmt = (d) => { if(!d) return ''; const p = d.split('-'); return p.length === 3 ? `${p[2]}.${p[1]}.${p[0].slice(-2)}` : d; };

function hesapla(k) {
    let ilave = k.hareketler.filter(h => h.tip === 'ilave').reduce((a, b) => a + Number(b.adet || 0), 0);
    let tb = Number(k.stok || 0) + ilave;
    let satilan = k.hareketler.filter(h => h.tip === 'sayim').reduce((a, b) => a + (Number(b.onceki) - Number(b.kalan)), 0);
    let tahsil_edilen = k.hareketler.reduce((a, b) => a + Number(b.tahsilat || 0), 0);
    let bekleyen = (satilan * PRICE) - tahsil_edilen;
    return { tb, satilan, kalan: tb - satilan, tahsil_edilen, bekleyen };
}

function updatePrice(val) {
    PRICE = Number(val);
    save();
    render();
}

function render() {
    let g_tahsil = 0, g_bekleyen = 0;
    kayitlar.forEach(k => {
        const h = hesapla(k);
        g_tahsil += h.tahsil_edilen; g_bekleyen += h.bekleyen;
    });

    document.getElementById('hdate').textContent = new Date().toLocaleDateString('tr-TR');
    document.getElementById('stats-grid').innerHTML = `
        <div class="s-card"><div style="font-size:10px;color:var(--text2)">TAHSİL EDİLEN</div><div class="s-val" style="color:var(--green)">${g_tahsil}₺</div></div>
        <div class="s-card"><div style="font-size:10px;color:var(--text2)">BEKLEYEN ALACAK</div><div class="s-val" style="color:var(--yellow)">${g_bekleyen}₺</div></div>`;

    const el = document.getElementById('content');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
    document.getElementById('tab-' + tab).classList.add('on');

    if (tab === 'yeni') {
        el.innerHTML = `<div class="card"><h3>Yeni Stand</h3><br>
            <div class="field"><label>Nokta</label><select id="n-bufe">${noktalar.map(n => `<option>${n}</option>`).join('')}</select></div>
            <div class="field"><label>Stok</label><input type="number" id="n-stok" value="61"></div>
            <button class="btn-sm" style="width:100%;background:var(--accent);color:#fff" onclick="yeniEkle()">Kaydet</button></div>`;
    } else if (tab === 'liste') {
        el.innerHTML = kayitlar.map((k, ki) => {
            const h = hesapla(k);
            return `<div class="card">
                <div style="font-size:18px;font-weight:600">${k.bufe}</div>
                <div class="pills">
                    <span class="pill">Stok: ${h.kalan}</span>
                    <span class="pill" style="color:var(--green)">Tahsilat: ${h.tahsil_edilen}₺</span>
                    <span class="pill" style="color:var(--yellow)">Alacak: ${h.bekleyen}₺</span>
                </div>
                <div style="display:flex;gap:6px;margin-top:12px">
                    <button class="btn-sm" style="color:var(--green)" onclick="openM('sayim',${ki})">Sayım & Tahsilat</button>
                    <button class="btn-sm" onclick="openM('ilave',${ki})">İlave</button>
                    <button class="btn-sm" style="color:var(--red)" onclick="if(confirm('Emin misin?')){kayitlar.splice(${ki},1);save();render();}">Kaldır</button>
                </div>
                ${k.hareketler.slice().reverse().map(hr => `
                    <div class="w-block" style="border-left-color:${hr.tip === 'sayim' ? 'var(--green)' : 'var(--accent)'}">
                        <div style="font-size:12px"><strong>${hr.tip === 'sayim' ? 'Sayım' : 'İlave'}</strong> — ${fmt(hr.tarih)}</div>
                        <div style="font-size:11px;color:var(--text2)">
                            ${hr.tip === 'sayim' ? `Satılan: ${hr.onceki-hr.kalan} | Alınan: ${hr.tahsilat || 0}₺` : `Eklenen: ${hr.adet}`}
                        </div>
                    </div>`).join('')}
            </div>`}).join('');
    } else {
        el.innerHTML = `
            <div class="card">
                <h3>Birim Fiyat Ayarı</h3><br>
                <div class="field">
                    <label>Ürün Satış Fiyatı (₺)</label>
                    <input type="number" value="${PRICE}" onchange="updatePrice(this.value)" style="border-color:var(--accent)">
                </div>
                <p style="font-size:11px;color:var(--text2)">* Fiyatı değiştirdiğinde tüm bekleyen alacaklar otomatik yeniden hesaplanır.</p>
            </div>
            <div class="card">
                <h3>Noktalar</h3><br>
                ${noktalar.map((n, i) => `<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid #333">${n}<button class="btn-sm" style="flex:none;padding:4px 8px" onclick="noktalar.splice(${i},1);save();render();">Sil</button></div>`).join('')}
                <input type="text" id="yn" placeholder="Yeni nokta..." style="width:100%;padding:12px;margin-top:10px;background:#242424;border:1px solid #333;color:#fff;border-radius:8px">
                <button class="btn-sm" style="width:100%;margin-top:8px" onclick="const v=document.getElementById('yn').value;if(v){noktalar.push(v);save();render();}">Ekle</button>
            </div>`;
    }
}

function yeniEkle() {
    const b = document.getElementById('n-bufe').value, s = Number(document.getElementById('n-stok').value);
    kayitlar.unshift({ bufe: b, stok: s, tarih: new Date().toISOString().split('T')[0], hareketler: [] });
    save(); setTab('liste');
}

function openM(tip, ki) {
    let icerik = `<h3>${tip === 'sayim' ? 'Sayım & Tahsilat' : 'İlave'}</h3><br>
        <div class="field"><label>${tip === 'sayim' ? 'Rafta Kalan Adet' : 'İlave Adet'}</label><input type="number" id="mv" autofocus></div>`;
    if(tip === 'sayim') icerik += `<div class="field"><label>Alınan Nakit (₺)</label><input type="number" id="mtahsil" value="0"></div>`;
    
    document.getElementById('modal-inner').innerHTML = icerik + `<button class="btn-sm" style="width:100%;background:var(--accent);color:#fff" onclick="modalS('${tip}',${ki})">Kaydet</button>`;
    document.getElementById('modal-bg').classList.remove('hidden');
}

function modalS(tip, ki) {
    const v = Number(document.getElementById('mv').value);
    const t = tip === 'sayim' ? Number(document.getElementById('mtahsil').value) : 0;
    const h = hesapla(kayitlar[ki]);
    const d = new Date().toISOString().split('T')[0];
    
    if (tip === 'sayim') {
        if(v > h.kalan) { alert('Hata: Kalan stok mevcut olandan fazla olamaz!'); return; }
        kayitlar[ki].hareketler.push({ tip: 'sayim', kalan: v, onceki: h.kalan, tahsilat: t, tarih: d });
    } else {
        kayitlar[ki].hareketler.push({ tip: 'ilave', adet: v, tarih: d });
    }
    save(); closeModal(); render();
}

render();
</script>
</body></html>
