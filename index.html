<!DOCTYPE html>
<html lang="tr"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PolyPlay — Stand Takip</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#0f0f0f; --bg2:#1a1a1a; --bg3:#242424; --border:#2e2e2e;
  --text:#f0f0f0; --text2:#888; --text3:#555;
  --green:#22c55e; --green-bg:rgba(34,197,94,0.1);
  --yellow:#f59e0b; --yellow-bg:rgba(245,158,11,0.1);
  --red:#ef4444; --red-bg:rgba(239,68,68,0.1);
  --accent:#ff5733; --radius:12px; --radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:80px}
.header{padding:20px 16px 10px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:20px;font-weight:600;letter-spacing:-0.5px}
.logo span{color:var(--accent)}
.header-date{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:16px}
.stat-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em}
.stat-val{font-size:18px;font-weight:600;font-family:'DM Mono',monospace}
.tabs{display:flex;gap:4px;padding:8px 16px 12px;position:sticky;top:0;background:var(--bg);z-index:10}
.tab{flex:1;padding:10px;font-size:12px;font-weight:500;border:0.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;background:var(--bg2);color:var(--text2);text-align:center}
.tab.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.content{padding:0 16px}
.card,.stand-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;color:var(--text2);margin-bottom:6px}
.field input,.field select{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px;font-size:14px;color:var(--text);outline:none;transition:border-color 0.2s}
.field input:focus{border-color:var(--accent)}
.btn-primary{width:100%;padding:14px;font-size:14px;font-weight:600;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer}
.btn-sm{font-size:11px;padding:8px 12px;border-radius:6px;cursor:pointer;background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.btn-success{color:var(--green);background:var(--green-bg);border-color:var(--green)}
.pills{display:flex;gap:6px;margin-bottom:12px}
.pill{font-size:10px;padding:4px 8px;border-radius:4px;background:var(--bg3);font-family:'DM Mono',monospace;border:0.5px solid var(--border)}
.week-block{background:var(--bg3);border-radius:var(--radius-sm);padding:12px;margin-top:10px;border-left:4px solid var(--border)}
.week-block.paid{border-left-color:var(--green)}
.week-block.partial{border-left-color:var(--yellow)}
.week-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:flex-end;z-index:100;padding:16px}
.modal{background:var(--bg2);border-radius:var(--radius);padding:20px;width:100%;max-width:400px;margin:0 auto}
.hidden{display:none}
</style>
</head>
<body>
<div class="header">
  <div class="logo">Poly<span>Play</span></div>
  <div class="header-date" id="hdate"></div>
</div>
<div id="stats-grid" class="stats-grid"></div>
<div class="tabs">
  <div class="tab on" id="tab-yeni" onclick="setTab('yeni')">Yeni Stand</div>
  <div class="tab" id="tab-liste" onclick="setTab('liste')">Standlar</div>
  <div class="tab" id="tab-noktalar" onclick="setTab('noktalar')">Noktalar</div>
</div>
<div class="content" id="content"></div>
<div class="modal-bg hidden" id="modal-bg" onclick="if(event.target.id==='modal-bg') closeModal()">
  <div class="modal" id="modal-inner"></div>
</div>
<script>
const PRICE = 75;
let kayitlar = JSON.parse(localStorage.getItem('pp_k') || '[]');
let noktalar = JSON.parse(localStorage.getItem('pp_n') || '["Ucuzluk","Kırtasiye","Pastane","Erkut büfe"]');
let tab = 'yeni';

function save(){ localStorage.setItem('pp_k', JSON.stringify(kayitlar)); localStorage.setItem('pp_n', JSON.stringify(noktalar)); }
function today(){ return new Date().toISOString().split('T')[0]; }
function fmt(d){ if(!d) return '-'; const p=d.split('-'); return p.length<3 ? d : `${p[2]}.${p[1]}.${p[0].slice(2)}`; }

function hesapla(k){
  const ilave = k.hareketler.filter(h=>h.tip==='ilave').reduce((a,h)=>a+(Number(h.adet)||0),0);
  const tb = (Number(k.stok)||0) + ilave;
  let satilan = 0, bekleyen = 0, toplam_alinan = 0;
  k.hareketler.filter(h=>h.tip==='sayim').forEach(h => {
    const s = (Number(h.onceki)||0) - (Number(h.kalan)||0);
    satilan += s;
    const tutar = s * PRICE;
    const alinan = Number(h.alinan_tutar) || 0;
    toplam_alinan += alinan;
    bekleyen += (tutar - alinan);
  });
  return {tb, satilan, kalan:tb-satilan, bekleyen, toplam_alinan};
}

function render(){
  document.getElementById('hdate').textContent = new Date().toLocaleDateString('tr-TR',{day:'2-digit',month:'long',year:'numeric'});
  let g_tb=0, g_ts=0, g_bekleyen=0, g_toplam=0;
  kayitlar.forEach(k=>{ const h=hesapla(k); g_tb+=h.tb; g_ts+=h.satilan; g_bekleyen+=h.bekleyen; g_toplam+=h.toplam_alinan; });
  
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-label">Bekleyen</div><div class="stat-val" style="color:var(--yellow)">${g_bekleyen}₺</div></div>
    <div class="stat-card"><div class="stat-label">Tahsil Edilen</div><div class="stat-val" style="color:var(--green)">${g_toplam}₺</div></div>`;

  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('tab-'+tab).classList.add('on');
  const el = document.getElementById('content');
  if(tab==='yeni') renderYeni(el); else if(tab==='liste') renderListe(el); else renderNoktalar(el);
}

function renderYeni(el){
  el.innerHTML = `<div class="card"><h3>Stand Kurulumu</h3><br>
    <div class="field"><label>Nokta Seç</label><select id="n-bufe">${noktalar.map(n=>`<option>${n}</option>`).join('')}</select></div>
    <div class="field"><label>Başlangıç Stok</label><input type="number" id="n-stok" value="61"></div>
    <div class="field"><label>Tarih</label><input type="date" id="n-tarih" value="${today()}"></div>
    <button class="btn-primary" onclick="kayitEkle()">Kaydı Tamamla</button></div>`;
}

function renderListe(el){
  if(!kayitlar.length) { el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text3)">Henüz stand yok.</div>'; return; }
  el.innerHTML = kayitlar.map((k,ki)=>{
    const h = hesapla(k);
    const hareketlerHtml = k.hareketler.filter(hr=>hr.tip==='sayim').reverse().map((hr,hi)=>{
      const g_hi = k.hareketler.length - 1 - hi;
      const borc = ((Number(hr.onceki)-Number(hr.kalan))*PRICE) - (Number(hr.alinan_tutar)||0);
      return `<div class="week-block ${borc<=0?'paid':'partial'}">
        <div class="week-row">Tarih: <span>${fmt(hr.tarih)}</span></div>
        <div class="week-row">Satılan: <span>${hr.onceki-hr.kalan} ad.</span></div>
        <div class="week-row">Kalan Borç: <strong style="color:${borc<=0?'var(--green)':'var(--yellow)'}">${borc}₺</strong></div>
        ${borc > 0 ? `<div style="margin-top:8px;display:flex;gap:5px">
          <input type="number" id="t-inp-${ki}-${g_hi}" placeholder="Miktar" style="flex:1;background:var(--bg);border:1px solid var(--border);color:#fff;font-size:12px;padding:4px;border-radius:4px">
          <button class="btn-sm btn-success" onclick="tahsilatYap(${ki},${g_hi})">Tahsil Et</button>
        </div>` : ''}
      </div>`;
    }).join('');
    return `<div class="stand-card">
      <div style="display:flex;justify-content:space-between"><strong>${k.bufe}</strong><span style="font-size:10px;color:var(--text3)">${fmt(k.tarih)}</span></div>
      <div class="pills" style="margin-top:8px">
        <span class="pill">Stok: ${h.kalan}</span>
        <span class="pill" style="color:var(--yellow)">Bekleyen: ${h.bekleyen}₺</span>
      </div>
      <div style="display:flex;gap:5px">
        <button class="btn-sm btn-success" onclick="openModal('sayim',${ki})">Sayım Yap</button>
        <button class="btn-sm" onclick="openModal('ilave',${ki})">İlave</button>
        <button class="btn-sm" style="color:var(--red)" onclick="if(confirm('Stand silinsin mi?')){kayitlar.splice(${ki},1);save();render();}">Sil</button>
      </div>
      ${hareketlerHtml}
    </div>`;
  }).join('');
}

function renderNoktalar(el){
  const borclar = {}; noktalar.forEach(n=>borclar[n]=0);
  kayitlar.forEach(k=>{ if(borclar.hasOwnProperty(k.bufe)) borclar[k.bufe]+=hesapla(k).bekleyen; });
  el.innerHTML = `<div class="card"><h3>Noktalar ve Toplam Borçlar</h3><br>
    ${noktalar.map((n,i)=>`<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
      <div><div>${n}</div><div style="font-size:11px;color:var(--yellow)">Borç: ${borclar[n]}₺</div></div>
      <button class="btn-sm" style="color:var(--red)" onclick="noktalar.splice(${i},1);save();render();">Sil</button>
    </div>`).join('')}
    <div style="display:flex;gap:5px;margin-top:15px">
      <input type="text" id="y-n" placeholder="Yeni nokta..." style="flex:1;padding:10px;background:var(--bg3);border:1px solid var(--border);color:#fff;border-radius:4px">
      <button class="btn-sm" onclick="const v=document.getElementById('y-n').value; if(v){noktalar.push(v);save();render();}">Ekle</button>
    </div></div>`;
}

function tahsilatYap(ki, hi){
  const val = parseInt(document.getElementById(`t-inp-${ki}-${hi}`).value);
  if(!val || val <= 0) return;
  kayitlar[ki].hareketler[hi].alinan_tutar = (Number(kayitlar[ki].hareketler[hi].alinan_tutar)||0) + val;
  save(); render();
}

function openModal(tip, ki){
  const h = hesapla(kayitlar[ki]);
  let html = `<h3>${tip==='sayim'?'Sayım Yap':'İlave Bırak'}</h3><br>
    <div class="field"><label>${tip==='sayim'?'Rafta Kalan Adet':'Eklenecek Adet'}</label><input type="number" id="m-val" autofocus></div>
    <div class="field"><label>Tarih</label><input type="date" id="m-tarih" value="${today()}"></div>
    <button class="btn-primary" onclick="modalKaydet('${tip}',${ki})">Kaydet</button>`;
  document.getElementById('modal-inner').innerHTML = html;
  document.getElementById('modal-bg').classList.remove('hidden');
}

function modalKaydet(tip, ki){
  const v = parseInt(document.getElementById('m-val').value), t = document.getElementById('m-tarih').value;
  if(isNaN(v)) return;
  const h = hesapla(kayitlar[ki]);
  if(tip==='sayim') kayitlar[ki].hareketler.push({tip:'sayim', tarih:t, kalan:v, onceki:h.kalan, alinan_tutar:0});
  else kayitlar[ki].hareketler.push({tip:'ilave', tarih:t, adet:v});
  save(); closeModal(); render();
}

function kayitEkle(){
  const b=document.getElementById('n-bufe').value, s=parseInt(document.getElementById('n-stok').value), t=document.getElementById('n-tarih').value;
  if(!b || isNaN(s)) return;
  kayitlar.unshift({id:Date.now(), bufe:b, stok:s, tarih:t, hareketler:[]});
  save(); tab='liste'; render();
}
function setTab(t){ tab=t; render(); }
function closeModal(){ document.getElementById('modal-bg').classList.add('hidden'); }
render();
</script>
</body></html>
