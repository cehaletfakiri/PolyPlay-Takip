.header{padding:16px 16px 10px;text-align:center}
.logo-img{width:200px;height:auto;display:block;margin:0 auto}
.top-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px 16px}
.ts{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:14px}
.ts-l{font-size:10px;color:var(--text2);margin-bottom:6px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase}
.ts-v{font-size:18px;font-weight:700;letter-spacing:-0.5px;font-family:'DM Mono',monospace;line-height:1.3}
.ts-v.g{color:var(--green)}.ts-v.y{color:var(--yellow)}.ts-v.r{color:var(--red)}.ts-v.p{color:var(--purple)}.ts-v.b{color:var(--blue)}
.tabs{display:flex;gap:4px;padding:0 16px 14px;position:sticky;top:0;background:rgba(15,15,15,0.95);backdrop-filter:blur(8px);z-index:20;padding-top:8px}
.tab{flex:1;padding:10px 4px;font-size:12px;font-weight:600;border:0.5px solid var(--border);border-radius:var(--rs);cursor:pointer;background:var(--bg2);color:var(--text2);text-align:center}
.tab.on{background:var(--purple);color:#fff;border-color:var(--purple)}
.content{padding:0 16px}
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px}
.card-title{font-size:14px;font-weight:600;margin-bottom:14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:500}
.field input,.field select{width:100%;background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--rs);padding:11px 13px;font-size:14px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--purple)}
.field select option{background:var(--bg3)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-main{width:100%;padding:13px;font-size:14px;font-weight:700;background:var(--purple);color:#fff;border:none;border-radius:var(--rs);cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:2px}
.btn-sm{font-size:12px;padding:7px 12px;border-radius:6px;cursor:pointer;background:var(--bg3);color:var(--text2);border:0.5px solid var(--border);font-family:'DM Sans',sans-serif;font-weight:500;white-space:nowrap}
.btn-green{color:var(--green);background:var(--gbg);border-color:rgba(34,197,94,0.25)}
.btn-purple{color:var(--purple);background:var(--pbg);border-color:rgba(168,85,247,0.25)}
.btn-red{color:var(--red);background:var(--rbg);border-color:rgba(239,68,68,0.25)}
.btn-blue{color:var(--blue);background:var(--bbg);border-color:rgba(59,130,246,0.25)}
.btn-yellow{color:var(--yellow);background:var(--ybg);border-color:rgba(245,158,11,0.25)}
.store-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;cursor:pointer}
.store-card:active{border-color:var(--purple)}
.store-name{font-size:18px;font-weight:700}
.store-meta{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:4px}
.store-stats{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}
.store-stat{font-size:12px;color:var(--text2)}
.stand-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.v-item{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:5px 0;border-bottom:0.5px solid var(--border)}
.v-item:last-child{border-bottom:none}
.v-date{color:var(--orange);font-family:'DM Mono',monospace;font-size:12px;min-width:70px}
.v-val{font-weight:600;display:flex;align-items:center;gap:6px}
.v-ilave{color:var(--blue)}.v-iade{color:var(--yellow)}
.v-total{display:flex;justify-content:space-between;padding:8px 0 0;margin-top:4px;border-top:1px solid var(--border)}
.v-total-lbl{font-size:13px;font-weight:700}
.v-total-val{font-size:13px;font-weight:700;color:var(--purple);font-family:'DM Mono',monospace}
.actions{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0 12px}
.period{background:var(--bg3);border-radius:var(--rs);padding:12px;margin-bottom:6px;border-left:3px solid var(--border)}
.period.latest{border-left-color:var(--purple)}.period.done{border-left-color:var(--green);opacity:0.8}
.p-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.p-hdr-t{font-size:11px;font-weight:700;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:0.04em;text-transform:uppercase}
.p-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:0.5px solid var(--bg4)}
.p-row:last-child{border-bottom:none}
.p-lbl{color:var(--text2)}.p-val{font-weight:600;font-family:'DM Mono',monospace}
.p-total{display:flex;justify-content:space-between;font-size:14px;font-weight:700;padding:8px 0 2px;margin-top:4px;border-top:1px solid var(--border)}
.p-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;font-family:'DM Mono',monospace;white-space:nowrap}
.badge-red{color:var(--red);background:var(--rbg)}.badge-green{color:var(--green);background:var(--gbg)}.badge-yellow{color:var(--yellow);background:var(--ybg)}.badge-gray{color:var(--text2);background:var(--bg3)}
.warn{background:rgba(245,158,11,0.07);border-radius:var(--rs);padding:10px 12px;margin-bottom:6px;border-left:3px solid var(--yellow);font-size:12px;color:var(--yellow);font-weight:600}
.debt-alert{background:var(--rbg);border:0.5px solid rgba(239,68,68,0.3);border-radius:var(--rs);padding:10px 12px;margin-bottom:10px;font-size:13px;color:var(--red)}
.n-card{background:var(--bg3);border-radius:var(--rs);padding:14px;margin-bottom:8px}
.n-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:8px 0}
.ng{background:var(--bg2);border-radius:6px;padding:10px;text-align:center}
.ng-l{font-size:10px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.04em}
.ng-v{font-size:18px;font-weight:700;font-family:'DM Mono',monospace}
.ng-v.g{color:var(--green)}.ng-v.r{color:var(--red)}.ng-v.b{color:var(--blue)}
.li{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:0.5px solid var(--border)}
.li:last-child{border-bottom:none}.li span{flex:1;font-size:14px}
.add-row{display:flex;gap:8px;margin-top:4px}
.add-row input{flex:1;background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--rs);padding:10px 12px;font-size:14px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none}
.add-row button{padding:10px 16px;font-size:13px;border-radius:var(--rs);cursor:pointer;background:var(--bg3);color:var(--text);border:0.5px solid var(--border);font-family:'DM Sans',sans-serif;font-weight:600}
.backup-btns{display:flex;gap:8px;margin-bottom:10px}
.backup-btns button{flex:1;padding:11px;font-size:13px;font-weight:600;border-radius:var(--rs);cursor:pointer;font-family:'DM Sans',sans-serif}
.backup-note{font-size:12px;color:var(--text3);line-height:1.7;padding:10px 12px;background:var(--bg3);border-radius:var(--rs)}
.sep{height:0.5px;background:var(--border);margin:14px 0}
.slbl{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:0.09em;text-transform:uppercase;margin-bottom:10px}
.empty{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:14px;line-height:1.8}
.back-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.filter-bar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.filter-btn{font-size:12px;padding:5px 12px;border-radius:20px;cursor:pointer;background:var(--bg3);color:var(--text2);border:0.5px solid var(--border);font-family:'DM Sans',sans-serif;font-weight:500}
.filter-btn.on{background:var(--purple);color:#fff;border-color:var(--purple)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:flex-end;justify-content:center;z-index:100;padding:0 12px 12px}
.modal{background:var(--bg2);border-radius:var(--r) var(--r) var(--rs) var(--rs);padding:22px 20px 20px;width:100%;max-width:480px;border:0.5px solid var(--border);max-height:85vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:4px}
.modal-sub{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.6}
.modal-sub strong{color:var(--text)}
.modal-acts{display:flex;gap:8px;margin-top:16px}
.modal-acts button{flex:1;padding:12px;font-size:14px;font-weight:600;border-radius:var(--rs);cursor:pointer;font-family:'DM Sans',sans-serif}
.preview{background:var(--bg3);border-radius:var(--rs);padding:12px;margin-top:10px}
.prev-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:0.5px solid var(--bg4)}
.prev-row:last-child{border-bottom:none}
.prev-lbl{color:var(--text2)}.prev-val{font-family:'DM Mono',monospace;font-weight:700}
.hidden{display:none}
</style>
</head>

<script>
const DP = 75;
let data = [];
let noktalar = ['Erkut büfe','Pastane','Kırtasiye','Ucuzluk'];
let tab = 'yeni';
let activeBufe = null;
let filterAy = 'tumu';
let noktalarAy = 'tumu';

function sk(){try{localStorage.setItem('pp8_k',JSON.stringify(data));}catch(e){}}
function sn(){try{localStorage.setItem('pp8_n',JSON.stringify(noktalar));}catch(e){}}
function loadData(){
  var kk=['pp8_k','pp7_k','pp6_k','ppv5_k','pp_k4','pp_k3','pp_k2','pp_k'];
  var nk=['pp8_n','pp7_n','pp6_n','ppv5_n','pp_n4','pp_n3','pp_n2','pp_n'];
  for(var i=0;i<kk.length;i++){try{var v=localStorage.getItem(kk[i]);if(v){data=JSON.parse(v);break;}}catch(e){}}
  for(var i=0;i<nk.length;i++){try{var v=localStorage.getItem(nk[i]);if(v){var a=JSON.parse(v);if(a.length>=4){noktalar=a;break;}}}catch(e){}}
}
function sanitize(){
  data=data.filter(function(k){return k&&typeof k==='object';});
  data.forEach(function(k){
    if(!k.tarih||typeof k.tarih!=='string')k.tarih=today();
    if(!k.bufe)k.bufe='Bilinmeyen';
    if(!k.stok||isNaN(k.stok))k.stok=0;
    if(!k.fiyat||isNaN(k.fiyat))k.fiyat=75;
    if(!Array.isArray(k.hareketler))k.hareketler=[];
    k.hareketler=k.hareketler.filter(function(h){return h&&h.tip;});
    k.hareketler.forEach(function(h){
      if(!h.tarih||typeof h.tarih!=='string')h.tarih=k.tarih;
      if((h.tip==='sayim'||h.tip==='ziyaret')&&(h.satilan==null||isNaN(h.satilan)))
        h.satilan=Math.max(0,(Number(h.onceki)||0)-(Number(h.kalan)||0));
      if(h.tip==='ziyaret'&&(h.iade==null||isNaN(h.iade)))h.iade=Number(h.kalan)||0;
      if(h.tip==='ilave'&&isNaN(h.adet))h.adet=0;
      if(h.tip==='iade'&&isNaN(h.adet))h.adet=0;
      if(h.tip==='tahsilat'&&isNaN(h.tutar))h.tutar=0;
    });
  });
}
function today(){return new Date().toISOString().split('T')[0];}
function fmt(d){try{if(!d||typeof d!=='string')return '';var p=d.split('-');if(p.length<3)return d;return p[2]+'.'+p[1]+'.'+p[0].slice(2);}catch(e){return '';}}
function fmtAy(ym){if(!ym||ym==='tumu')return 'Tümü';var p=ym.split('-');if(!p[0]||!p[1])return ym;var ay=['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];return ay[parseInt(p[1])-1]+' '+p[0].slice(2);}
function tl(n){return Number(n||0).toLocaleString('tr-TR')+'₺';}
function fp(k){return k.fiyat||DP;}

function calc(k){
  var f=fp(k),tv=Number(k.stok)||0,ts=0,tt=0,ti=0;
  (k.hareketler||[]).forEach(function(h){
    if(h.tip==='ilave')tv+=Number(h.adet)||0;
    if(h.tip==='sayim'||h.tip==='ziyaret')ts+=Number(h.satilan)||0;
    if(h.tip==='tahsilat')tt+=Number(h.tutar)||0;
    if(h.tip==='iade')ti+=Number(h.adet)||0;
    if(h.tip==='ziyaret')ti+=Number(h.iade)||0;
  });
  var kalan=tv-ts-ti,brut=ts*f;
  return{tv:tv,ts:ts,kalan:kalan,brut:brut,tt:tt,net:brut-tt,raf:kalan*f,ti:ti,iadeTutar:ti*f,f:f,tamamlandi:brut-tt<=0&&kalan<=0&&ts>0};
}
function totals(){
  var tv=0,ts=0,tt=0,brut=0,raf=0,raf_adet=0,ti=0,iT=0;
  data.forEach(function(k){var c=calc(k);tv+=c.tv;ts+=c.ts;tt+=c.tt;brut+=c.brut;raf+=c.raf;raf_adet+=c.kalan;ti+=c.ti;iT+=c.iadeTutar;});
  return{tv:tv,ts:ts,tt:tt,brut:brut,net:brut-tt,raf:raf,raf_adet:raf_adet,ti:ti,iadeTutar:iT};
}
function bufeCalc(bufe,ayF){
  var items=data.filter(function(k){return k.bufe===bufe&&(!ayF||ayF==='tumu'||k.tarih.startsWith(ayF));});
  var tv=0,ts=0,tt=0,ti=0;
  items.forEach(function(k){var c=calc(k);tv+=c.tv;ts+=c.ts;tt+=c.tt;ti+=c.ti;});
  var f=DP;return{tv:tv,ts:ts,kalan:tv-ts-ti,brut:ts*f,net:ts*f-tt,raf:(tv-ts-ti)*f,ti:ti,iadeTutar:ti*f,count:items.length};
}
function doExport(){
  var blob=new Blob([JSON.stringify({v:8,tarih:today(),data:data,noktalar:noktalar},null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);var a=document.createElement('a');
  a.href=url;a.download='polyplay_yedek_'+today()+'.json';a.click();URL.revokeObjectURL(url);
}
function doImport(){
  var inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var r=new FileReader();r.onload=function(ev){
      try{var d=JSON.parse(ev.target.result);var k=d.data||d.kayitlar;var n=d.noktalar;
        if(!k||!n){alert('Geçersiz dosya.');return;}
        if(!confirm(d.tarih+' tarihli yedek yüklensin mi?'))return;
        data=k;noktalar=n;sk();sn();sanitize();render();alert('Yüklendi.');
      }catch(ex){alert('Okunamadı.');}
    };r.readAsText(file);
  };inp.click();
}

    statsHtml='<div class="ts"><div class="ts-l">Toplam verilen</div><div class="ts-v">'+t.tv+' adet</div></div>'+
      '<div class="ts"><div class="ts-l">Toplam satılan</div><div class="ts-v g">'+t.ts+' · '+tl(t.brut)+'</div></div>'+
      '<div class="ts"><div class="ts-l">Toplam iade</div><div class="ts-v y">'+t.ti+' adet · '+tl(t.iadeTutar)+'</div></div>'+
      '<div class="ts"><div class="ts-l">Genel ciro</div><div class="ts-v g">'+tl(t.brut)+'</div></div>';
  }else{
    statsHtml='<div class="ts"><div class="ts-l">Aktif rafta</div><div class="ts-v">'+t.raf_adet+' adet</div></div>'+
      '<div class="ts"><div class="ts-l">Raf değeri</div><div class="ts-v p">'+tl(t.raf)+'</div></div>'+
      '<div class="ts"><div class="ts-l">Tahsil edildi</div><div class="ts-v b">'+tl(t.tt)+'</div></div>'+

  }
  document.getElementById('top-stats').innerHTML=statsHtml;
  ['yeni','liste','noktalar'].forEach(function(t2){

function rListe(el){
  if(activeBufe){rBufePage(el,activeBufe);return;}
  var bufeler=[];var seen={};
  data.forEach(function(k){if(!seen[k.bufe]){seen[k.bufe]=true;bufeler.push(k.bufe);}});
  if(!bufeler.length){el.innerHTML='<div class="empty">Henüz kayıt yok.</div>';return;}
  bufeler.sort(function(a,b){var na=bufeCalc(a,'tumu').net,nb=bufeCalc(b,'tumu').net;if(na>0&&nb<=0)return -1;if(na<=0&&nb>0)return 1;return nb-na;});
  el.innerHTML=bufeler.map(function(bufe){
    var bc=bufeCalc(bufe,'tumu');
    var items=data.filter(function(k){return k.bufe===bufe;});
    var sonT=items[0]?fmt(items[0].tarih):'';
    var badge=bc.net>0?'<span class="badge badge-red">'+tl(bc.net)+' borç</span>':(bc.ts>0?'<span class="badge badge-green">✓ Borçsuz</span>':'<span class="badge badge-gray">Yeni</span>');
    var tam=items.filter(function(k){return calc(k).tamamlandi;}).length;
    return '<div class="store-card" onclick="goStore(this.dataset.b)" data-b="'+bufe+'">'+'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><div class="store-name">'+bufe+'</div>'+badge+'</div>'+
      '<div class="store-stats"><span class="store-stat"><strong>'+bc.count+'</strong> dönem</span><span class="store-stat"><strong>'+bc.ts+'</strong> satıldı</span><span class="store-stat"><strong>'+tl(bc.tt)+'</strong> tahsil</span>'+(bc.ti>0?'<span class="store-stat"><strong>'+bc.ti+'</strong> iade</span>':'')+'</div>'+
      '<div class="store-meta">Son: '+sonT+(tam?' · '+tam+' tamamlandı':'')+' →</div></div>';
  }).join('');
}
function goStore(bufe){activeBufe=bufe;setFA('tumu');}

function rBufePage(el,bufe){
  var bc=bufeCalc(bufe,'tumu');
  var items=data.filter(function(k){return k.bufe===bufe;});
  var allM=[];var mSet={};
  items.forEach(function(k){if(k.tarih&&k.tarih.length>=7){var m=k.tarih.slice(0,7);if(!mSet[m]){mSet[m]=true;allM.push(m);}}});
  allM.sort().reverse();
  var badge=bc.net>0?' <span class="badge badge-red">'+tl(bc.net)+' borç</span>':'';
  var html='<div class="back-bar"><button class="btn-sm" onclick="activeBufe=null;render()" style="padding:8px 16px">← Geri</button>'+
    '<span style="font-size:18px;font-weight:700">'+bufe+badge+'</span></div>';
  html+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">'+
    '<div class="ts" style="flex:1;min-width:90px"><div class="ts-l">Satılan</div><div class="ts-v g" style="font-size:15px">'+bc.ts+' · '+tl(bc.brut)+'</div></div>'+
    '<div class="ts" style="flex:1;min-width:90px"><div class="ts-l">Tahsil</div><div class="ts-v b" style="font-size:15px">'+tl(bc.tt)+'</div></div>'+
    '<div class="ts" style="flex:1;min-width:90px"><div class="ts-l">Kalan</div><div class="ts-v '+(bc.net>0?'y':'g')+'" style="font-size:15px">'+tl(bc.net)+'</div></div></div>';
  if(allM.length>1){
    html+='<div class="filter-bar">';
    html+='<button class="filter-btn'+(filterAy==='tumu'?' on':'')+'" data-fa="tumu" data-fa=""+m+"" onclick="setFA(this.dataset.fa)">Tümü</button>';
    allM.forEach(function(m){html+='<button class="filter-btn'+(filterAy===m?' on':'')+'" data-fa="'+m+'" onclick="setFA(this.dataset.fa)">'+fmtAy(m)+'</button>';});
    html+='</div>';
  }
  var filtered=filterAy==='tumu'?items:items.filter(function(k){return k.tarih&&k.tarih.startsWith(filterAy);});
  if(!filtered.length){html+='<div class="empty">Bu dönemde kayıt yok.</div>';}
  else{filtered.forEach(function(k){html+=renderStandCard(k,data.indexOf(k));});}
  el.innerHTML=html;
}

function renderStandCard(k,ki){
  var c=calc(k),f=fp(k);
  var hs=k.hareketler||[];
  var sayimler=hs.map(function(h,i){return Object.assign({},h,{i:i});}).filter(function(h){return h.tip==='sayim'||h.tip==='ziyaret';});
  var ilaveler=hs.map(function(h,i){return Object.assign({},h,{i:i});}).filter(function(h){return h.tip==='ilave';});
  var tahsilatlar=hs.map(function(h,i){return Object.assign({},h,{i:i});}).filter(function(h){return h.tip==='tahsilat';});
  var iadeKayit=hs.map(function(h,i){return Object.assign({},h,{i:i});}).filter(function(h){return h.tip==='iade';});
  var vItems=[{tarih:k.tarih,adet:k.stok,tip:'b'}];
  ilaveler.forEach(function(il){vItems.push({tarih:il.tarih,adet:il.adet,tip:'i',i:il.i});});
  iadeKayit.forEach(function(ia){vItems.push({tarih:ia.tarih,adet:ia.adet,tip:'ia',i:ia.i});});
  vItems.sort(function(a,b){return a.tarih>b.tarih?1:-1;});
  var verilisH='';
  vItems.forEach(function(v){
    var vc='v-val',vt='',db='';
    if(v.tip==='b'){vt=v.adet+' adet verildi';}
    else if(v.tip==='i'){vc='v-val v-ilave';vt='+'+v.adet+' ilave';
      db='<button class="btn-sm" style="padding:2px 7px;font-size:11px" onclick="oM(10,'+ki+','+v.i+')">düzenle</button>'+
         '<button class="btn-sm btn-red" style="padding:2px 7px;margin-left:4px" onclick="silH('+ki+','+v.i+')">×</button>';}
    else if(v.tip==='ia'){vc='v-val v-iade';vt='−'+v.adet+' iade alındı';
      db='<button class="btn-sm" style="padding:2px 7px;font-size:11px" onclick="oM(11,'+ki+','+v.i+')">düzenle</button>'+
         '<button class="btn-sm btn-red" style="padding:2px 7px;margin-left:4px" onclick="silH('+ki+','+v.i+')">×</button>';}
    verilisH+='<div class="v-item"><span class="v-date">'+fmt(v.tarih)+'</span><span class="'+vc+'">'+vt+db+'</span></div>';
  });
  verilisH+='<div class="v-total"><span class="v-total-lbl">Toplam verildi</span><span class="v-total-val">'+c.tv+' adet · '+tl(c.tv*f)+'</span></div>';
  var sonST=sayimler.length?sayimler[sayimler.length-1].tarih:k.tarih;
  var bekI=ilaveler.filter(function(il){return il.tarih>sonST;});
  var warnH=bekI.length?'<div class="warn">Ziyaret bekleniyor · '+bekI.map(function(h){return fmt(h.tarih)+' +'+h.adet;}).join(', ')+'</div>':'';
  var periodsH='';
  if(!sayimler.length){periodsH='<div style="font-size:12px;color:var(--text3);padding:4px 0">Henüz ziyaret kaydı yok</div>';}
  else{
    var revS=[].concat(sayimler).reverse();
    revS.forEach(function(s,bi){
      var idx2=sayimler.length-1-bi;
      var oncT=idx2>0?sayimler[idx2-1].tarih:k.tarih;
      var dT=tahsilatlar.filter(function(t){return t.tarih>oncT&&t.tarih<=s.tarih;});
      var topT=dT.reduce(function(a,t){return a+t.tutar;},0);
      var dTutar=s.satilan*f,dNet=dTutar-topT,iadeA=s.iade||0,done=dNet<=0;
      var tahH=dT.map(function(t){
        return '<div class="p-row"><span class="p-lbl">Tahsilat ('+fmt(t.tarih)+')</span>'+
          '<span class="p-val" style="display:flex;align-items:center;gap:6px">'+
          '<span style="color:var(--blue)">'+tl(t.tutar)+'</span>'+
          '<button class="btn-sm" style="padding:2px 7px;font-size:11px" onclick="oM(13,'+ki+','+t.i+')">düzenle</button>'+
          '<button class="btn-sm btn-red" style="padding:2px 7px" onclick="silH('+ki+','+t.i+')">×</button>'+
          '</span></div>';
      }).join('');
      periodsH+='<div class="period'+(bi===0?' latest':'')+(done?' done':'')+'">'+
        '<div class="p-hdr"><span class="p-hdr-t">Ziyaret: '+fmt(s.tarih)+'</span>'+
        (done?'<span class="badge badge-green">Ödendi</span>':'<span class="badge badge-red">'+tl(dNet)+'</span>')+'</div>'+
        '<div class="p-row"><span class="p-lbl">Bu dönem satılan</span><span class="p-val" style="color:var(--green)">'+s.satilan+' adet · '+tl(dTutar)+'</span></div>'+
        (iadeA>0?'<div class="p-row"><span class="p-lbl">İade alınan</span><span class="p-val" style="color:var(--yellow)">'+iadeA+' adet · '+tl(iadeA*f)+'</span></div>':'')+
        tahH+
        '<div class="p-total"><span>Tahsil edilecek</span><span style="color:'+(dNet>0?'var(--red)':'var(--green)')+'">'+tl(dNet)+'</span></div>'+
        '<div class="p-foot"><button class="btn-sm" onclick="oM(12,'+ki+','+s.i+')">Düzenle</button>'+
        '<button class="btn-sm btn-red" onclick="silH('+ki+','+s.i+')">Ziyareti sil</button></div></div>';
    });
  }
  var cardB=c.tamamlandi?'<span class="badge badge-green">Tamamlandı</span>':(c.net>0?'<span class="badge badge-red">'+tl(c.net)+' borç</span>':'<span class="badge badge-yellow">Devam ediyor</span>');
  return '<div class="stand-card">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'+
    '<div><div style="font-size:15px;font-weight:700">'+fmt(k.tarih)+' kaydı'+(k.not?'<span style="font-size:12px;font-weight:400;color:var(--text3);margin-left:8px">'+k.not+'</span>':'')+'</div></div>'+cardB+'</div>'+
    verilisH+
    '<div class="actions">'+
    '<button class="btn-sm btn-purple" onclick="oM(20,'+ki+')">İade al</button>'+
    '<button class="btn-sm btn-green" onclick="oM(21,'+ki+')">Tahsilat</button>'+
    '<button class="btn-sm" onclick="oM(22,'+ki+')">İlave</button>'+
    '<button class="btn-sm" onclick="oM(23,'+ki+')">Düzenle</button>'+
    '<button class="btn-sm btn-red" onclick="silKayit('+ki+')">Sil</button>'+
    '</div>'+warnH+periodsH+'</div>';
}

        '<div style="font-size:12px;color:var(--text2);display:flex;gap:12px;flex-wrap:wrap"><span>Brüt: <strong style="color:var(--green)">'+tl(bc.brut)+'</strong></span>'+(bc.ti>0?'<span>İade: <strong style="color:var(--yellow)">'+bc.ti+' adet</strong></span>':'')+'<span>'+bc.count+' dönem</span></div></div>';

    '<div class="backup-btns"><button class="btn-sm btn-blue" onclick="doExport()">Dışa aktar</button><button class="btn-sm" onclick="doImport()">İçe aktar</button></div>'+
    '<div class="backup-note">Dışa aktar → JSON indirir. İçe aktar → dosyayı seç, veriler yüklenir.</div>';

// Tip map: 10=ilave_duz, 11=iade_duz, 12=ziyaret_duz, 13=tahsilat_duz, 20=iade, 21=tahsilat, 22=ilave, 23=duzenle
var TIPMAP={10:'ilave_duzenle',11:'iade_duzenle',12:'ziyaret_duzenle',13:'tahsilat_duzenle',20:'iade',21:'tahsilat',22:'ilave',23:'duzenle'};
function oM(tipCode,ki,hi){openModal(TIPMAP[tipCode]||tipCode,ki,hi);}

function openModal(tip,ki,hi){
  var k=data[ki],c=calc(k),f=fp(k);
  var ic='';
  if(tip==='iade'){
    ic='<div class="modal-title">İade al — '+k.bufe+'</div>'+
      '<div class="modal-sub">Rafta <strong>'+c.kalan+' adet</strong> görünüyor. Geri aldığın adeti gir:</div>'+
      '<div class="field"><input type="number" id="m-v" inputmode="numeric" min="0" max="'+c.kalan+'" placeholder="0" oninput="pIade('+c.kalan+','+f+')"></div>'+
      '<div class="field"><label>Tarih</label><input type="date" id="m-t" value="'+today()+'"></div><div id="m-prev"></div>';
  }else if(tip==='iade_duzenle'){
    var mh=hi!=null?k.hareketler[hi]:null;
    ic='<div class="modal-title">İade düzenle — '+k.bufe+'</div>'+
      '<div class="field"><label>İade alınan adet</label><input type="number" id="m-v" inputmode="numeric" min="0" value="'+(mh?mh.iade||mh.adet:'')+'" placeholder="0"></div>'+
      '<div class="field"><label>Tarih</label><input type="date" id="m-t" value="'+(mh?mh.tarih:today())+'"></div>';
  }else if(tip==='tahsilat'||tip==='tahsilat_duzenle'){
    var mh=tip==='tahsilat_duzenle'&&hi!=null?k.hareketler[hi]:null;
    var gNet=mh?c.net+mh.tutar:c.net;
    ic='<div class="modal-title">'+(mh?'Tahsilat düzenle':'Tahsilat')+' — '+k.bufe+'</div>'+
      '<div class="modal-sub">Toplam brüt: <strong>'+tl(c.brut)+'</strong><br>Tahsil edildi: <strong style="color:var(--green)">'+tl(c.tt-(mh?mh.tutar:0))+'</strong><br>Kalan borç: <strong style="color:'+(gNet>0?'var(--red)':'var(--green)')+'">'+tl(gNet)+'</strong></div>'+
      '<div class="field"><label>Tutar (₺)</label><input type="number" id="m-v" inputmode="numeric" min="0" value="'+(mh?mh.tutar:'')+'" placeholder="0" oninput="pTahsilat('+gNet+')"></div>'+
      '<div class="field"><label>Tarih</label><input type="date" id="m-t" value="'+(mh?mh.tarih:today())+'"></div><div id="m-prev"></div>';
  }else if(tip==='ilave'||tip==='ilave_duzenle'){
    var mh=tip==='ilave_duzenle'&&hi!=null?k.hareketler[hi]:null;
    ic='<div class="modal-title">'+(mh?'İlave düzenle':'İlave ekle')+' — '+k.bufe+'</div>'+
      '<div class="modal-sub">Mevcut rafta kalan: <strong>'+c.kalan+' adet</strong></div>'+
      '<div class="field"><label>Götürülen adet</label><input type="number" id="m-v" inputmode="numeric" min="1" value="'+(mh?mh.adet:'')+'" placeholder="10"></div>'+
      '<div class="field"><label>Tarih</label><input type="date" id="m-t" value="'+(mh?mh.tarih:today())+'"></div>';
  }else if(tip==='ziyaret_duzenle'){
    var mh=hi!=null?k.hareketler[hi]:null;
    ic='<div class="modal-title">Ziyaret düzenle — '+k.bufe+'</div>'+
      '<div class="modal-sub">Satılan ve iade yeniden hesaplanır.</div>'+
      '<div class="field"><label>Geri aldığın adet</label><input type="number" id="m-v" inputmode="numeric" min="0" value="'+(mh?mh.iade:'')+'" placeholder="0" oninput="pIade('+(mh?mh.onceki:c.kalan)+','+f+')"></div>'+
      '<div class="field"><label>Tarih</label><input type="date" id="m-t" value="'+(mh?mh.tarih:today())+'"></div><div id="m-prev"></div>';
  }else if(tip==='duzenle'){
    var opts='';noktalar.forEach(function(b){opts+='<option value="'+b+'"'+(b===k.bufe?' selected':'')+'>'+b+'</option>';});
    ic='<div class="modal-title">Kaydı düzenle</div>'+
      '<div class="field"><label>Satış noktası</label><select id="m-bufe">'+opts+'</select></div>'+
      '<div class="field"><label>Not</label><input type="text" id="m-not" value="'+(k.not||'')+'"></div>'+
      '<div class="row2"><div class="field"><label>Başlangıç stok</label><input type="number" id="m-stok" inputmode="numeric" value="'+k.stok+'" min="0"></div>'+
      '<div class="field"><label>Birim fiyat (₺)</label><input type="number" id="m-fiyat" inputmode="numeric" value="'+f+'" min="0"></div></div>'+
      '<div class="field"><label>Veriliş tarihi</label><input type="date" id="m-t" value="'+k.tarih+'"></div>';
  }
  document.getElementById('modal-box').innerHTML=ic+
    '<div class="modal-acts"><button class="btn-sm" style="font-size:13px;padding:12px" onclick="closeModal()">İptal</button>'+
    '<button class="btn-main" style="margin-top:0" onclick="saveModal(this.dataset.tip,'+ki+','+(hi!=null?hi:'null')+')" data-tip="'+tip+'">Kaydet</button></div>';
  document.getElementById('modal-bg').classList.remove('hidden');
}

function pIade(kalan,f){
  var v=parseInt(document.getElementById('m-v').value);
  var el=document.getElementById('m-prev');
  if(!isNaN(v)&&v>=0&&v<=kalan){var sat=kalan-v;
    el.innerHTML='<div class="preview"><div class="prev-row"><span class="prev-lbl">Satılan</span><span class="prev-val" style="color:var(--green)">'+sat+' adet · '+tl(sat*f)+'</span></div>'+
      '<div class="prev-row"><span class="prev-lbl">İade alınan</span><span class="prev-val" style="color:var(--yellow)">'+v+' adet · '+tl(v*f)+'</span></div></div>';
  }else{el.innerHTML='';}
}
function pTahsilat(net){
  var v=parseInt(document.getElementById('m-v').value);
  var el=document.getElementById('m-prev');
  if(!isNaN(v)&&v>0){var kal=net-v;
    el.innerHTML='<div class="preview"><div class="prev-row"><span class="prev-lbl">Bu ödeme</span><span class="prev-val" style="color:var(--green)">'+tl(v)+'</span></div>'+
      '<div class="prev-row"><span class="prev-lbl">Sonraki kalan borç</span><span class="prev-val" style="color:'+(kal>0?'var(--red)':'var(--green)')+'">'+tl(kal)+'</span></div></div>';
  }else{el.innerHTML='';}
}
function closeModal(){document.getElementById('modal-bg').classList.add('hidden');}
function bgClick(e){if(e.target.id==='modal-bg')closeModal();}

function saveModal(tip,ki,hi){
  var k=data[ki],c=calc(k),f=fp(k);
  if(tip==='iade'){
    var v=parseInt(document.getElementById('m-v').value),t=document.getElementById('m-t').value;
    if(isNaN(v)||v<0){alert('Geçersiz değer.');return;}
    if(v>c.kalan){alert('Rafta kalan adetten fazla olamaz.');return;}
    k.hareketler.push({tip:'ziyaret',tarih:t,kalan:v,satilan:c.kalan-v,onceki:c.kalan,iade:v});
  }else if(tip==='iade_duzenle'){
    var v=parseInt(document.getElementById('m-v').value),t=document.getElementById('m-t').value;
    if(isNaN(v)||v<0){alert('Geçersiz değer.');return;}
    if(hi!=null){var h=k.hareketler[hi];k.hareketler[hi]=Object.assign({},h,{iade:v,kalan:v,satilan:Math.max(0,h.onceki-v),tarih:t});}
  }else if(tip==='tahsilat'){
    var v=parseInt(document.getElementById('m-v').value),t=document.getElementById('m-t').value;
    if(!v||v<0){alert('Geçersiz tutar.');return;}
    k.hareketler.push({tip:'tahsilat',tarih:t,tutar:v});
  }else if(tip==='tahsilat_duzenle'){
    var v=parseInt(document.getElementById('m-v').value),t=document.getElementById('m-t').value;
    if(!v||v<0){alert('Geçersiz tutar.');return;}
    if(hi!=null)k.hareketler[hi]=Object.assign({},k.hareketler[hi],{tutar:v,tarih:t});
  }else if(tip==='ilave'||tip==='ilave_duzenle'){
    var v=parseInt(document.getElementById('m-v').value),t=document.getElementById('m-t').value;
    if(!v||v<1){alert('Geçersiz adet.');return;}
    if(tip==='ilave_duzenle'&&hi!=null)k.hareketler[hi]=Object.assign({},k.hareketler[hi],{adet:v,tarih:t});
    else k.hareketler.push({tip:'ilave',tarih:t,adet:v});
  }else if(tip==='ziyaret_duzenle'){
    var v=parseInt(document.getElementById('m-v').value),t=document.getElementById('m-t').value;
    if(isNaN(v)||v<0){alert('Geçersiz değer.');return;}
    if(hi!=null){var h=k.hareketler[hi];k.hareketler[hi]=Object.assign({},h,{iade:v,kalan:v,satilan:Math.max(0,h.onceki-v),tarih:t});}
  }else if(tip==='duzenle'){
    k.bufe=document.getElementById('m-bufe').value;
    k.not=document.getElementById('m-not').value.trim();
    k.stok=parseInt(document.getElementById('m-stok').value)||k.stok;
    k.fiyat=parseInt(document.getElementById('m-fiyat').value)||DP;
    k.tarih=document.getElementById('m-t').value;
  }
  sk();closeModal();render();
}

function kayitEkle(){
  var bufe=document.getElementById('n-bufe').value;
  var not=document.getElementById('n-not').value.trim();
  var stok=parseInt(document.getElementById('n-stok').value)||0;
  var fiyat=parseInt(document.getElementById('n-fiyat').value)||DP;
  var tarih=document.getElementById('n-tarih').value;
  if(!bufe||!tarih){alert('Satış noktası ve tarih zorunlu.');return;}
  if(stok<1){alert('Verilen adet en az 1 olmalı.');return;}
  data.unshift({id:Date.now(),bufe:bufe,not:not,stok:stok,fiyat:fiyat,tarih:tarih,hareketler:[]});
  sk();activeBufe=bufe;tab='liste';render();
}
function silKayit(ki){
  if(!confirm(data[ki].bufe+' kaydı silinsin mi?'))return;
  var bufe=data[ki].bufe;data.splice(ki,1);sk();
  if(!data.some(function(k){return k.bufe===bufe;}))activeBufe=null;
  render();
}
function silH(ki,hi){
  if(!confirm('Bu kayıt silinsin mi?'))return;
  data[ki].hareketler.splice(hi,1);sk();render();
}
function addN(){
  var v=document.getElementById('yn').value.trim();
  if(!v)return;
  if(noktalar.indexOf(v)>=0){alert('Zaten var.');return;}
  noktalar.push(v);sn();render();setTab('noktalar');
}
function silN(i){
  if(!confirm(noktalar[i]+' silinsin mi?'))return;
  noktalar.splice(i,1);sn();render();setTab('noktalar');
}
function setFA(v){filterAy=v;render();}
function setNA(v){noktalarAy=v;render();}
loadData();sanitize();render();
</script>

</body></html>
